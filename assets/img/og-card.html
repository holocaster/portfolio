<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<!--
  Fonte para gerar assets/img/og.jpg (cartao de previa do LinkedIn/redes).
  Nao e servida ao publico. Para regerar a imagem, renderize este arquivo
  a 1200x630 e exporte como assets/img/og.jpg.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #FBFAF6;
    --paper-2: #F3F0E8;
    --ink: #1A1916;
    --ink-soft: #57534A;
    --line: #E5E1D6;
    --accent: #B5532B;
    --font-display: "Fraunces", Georgia, serif;
    --font-body: "DM Sans", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    background:
      radial-gradient(120% 140% at 100% 0%, var(--paper-2) 0%, var(--paper) 55%);
  }
  /* faixa de destaque terracota a esquerda */
  .card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 14px;
    background: var(--accent);
  }
  .top {
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .monogram {
    width: 76px; height: 76px;
    border-radius: 18px;
    background: var(--ink);
    color: var(--accent);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 21px;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    text-transform: none;
  }
  .name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 76px;
    line-height: 1.02;
    letter-spacing: -0.015em;
    max-width: 16ch;
  }
  .name em {
    font-style: italic;
    color: var(--accent);
  }
  .bio {
    margin-top: 26px;
    font-size: 27px;
    line-height: 1.5;
    color: var(--ink-soft);
    max-width: 30ch;
  }
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .tags {
    display: flex;
    gap: 14px;
    list-style: none;
  }
  .tags li {
    font-family: var(--font-mono);
    font-size: 19px;
    color: var(--ink);
    padding: 9px 18px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255,255,255,0.5);
  }
  .url {
    font-family: var(--font-mono);
    font-size: 21px;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="card">
    <div>
      <div class="top">
        <div class="monogram">P</div>
        <span class="eyebrow">/ Engenheiro de Software Sênior</span>
      </div>
      <h1 class="name" style="margin-top:38px">Paulo Roberto<br />Sousa Pereira</h1>
      <p class="bio">Portfólio de aplicações web criadas com <em>IA</em>, rodando em produção.</p>
    </div>
    <div class="bottom">
      <ul class="tags">
        <li>Chopp Correto</li>
        <li>Currículo com IA</li>
        <li>Matriz de Riscos</li>
      </ul>
      <span class="url">prsites.com.br</span>
    </div>
  </div>
</body>
</html>
